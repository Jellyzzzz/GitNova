server:
  port: 8080

spring:
  application:
    name: gitnova

  # ===== 数据库 =====
  datasource:
    url: jdbc:mysql://localhost:3306/gitnova?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000

  # ===== Jackson序列化 =====
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null   # 不序列化null字段

  # ===== 文件上传：push时multipart传输对象包 =====
  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB       # 单文件最大500MB
      max-request-size: 500MB

  # ===== 异步线程池：Spring Event @Async使用 =====
  task:
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100
      thread-name-prefix: gitnova-async-

# ===== MyBatis-Plus =====
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true     # 下划线转驼峰
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl   # 开发期打印SQL，生产期注释掉
  global-config:
    db-config:
      logic-delete-field: deleted          # 逻辑删除字段名（如有需要）
      logic-delete-value: 1
      logic-not-delete-value: 0

# ===== Swagger / Springdoc =====
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# ===== GitNova 自定义配置 =====
gitnova:

  # JWT配置
  jwt:
    secret: ${JWT_SECRET:gitnova-dev-secret-key-please-change-in-production}
    expire: 86400000              # 24小时，单位ms

  # 仓库存储根目录（两台机器通过环境变量设不同路径）
  repo:
    base-path: ${REPO_BASE_PATH:D:/gitnova-repos}

  # LLM API配置（Phase 4 Agent使用）
  llm:
    api-key: ${LLM_API_KEY:}                                      # 必须通过环境变量注入，不要硬编码
    base-url: ${LLM_BASE_URL:https://api.deepseek.com}
    model: ${LLM_MODEL:deepseek-chat}
    timeout: 60                   # 秒，LLM响应可能较慢

  # 存储策略（Phase 1 接口，Phase 2 起用）
  storage:
    type: local                    # local | minio（未来扩展）
    max-object-size: 104857600     # 单个对象最大 100 MB

  # 对象传输配置（Phase 2）
  transfer:
    max-objects-per-push: 10000   # 单次push最大对象数，防止恶意大push
    chunk-size: 4096              # 分块读写字节数
